name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate agents
        run: node scripts/validate-agents.mjs
      - name: TypeScript check
        run: |
          npm ci
          npx tsc --noEmit
